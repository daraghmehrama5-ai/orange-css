<!DOCTYPE html>

    <title>Member Login</title>

    <link rel="stylesheet" href="task3.2.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Member Login</h1>

                <img src="images/Screenshot 2026-07-01 103946.png" alt="Laptop">

            </div>

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>

                    <i class="fa-solid fa-lock"></i>

                <button>LOGIN</button>

                <p>
                    Forgot

                    <a href="#">Password?</a>

                <a href="#" class="create-account">

    </div>
