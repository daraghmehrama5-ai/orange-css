<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="task3.1.css">
</head>
<body class="contact-page">

  <main class="contact-container">

    <section class="contact-card">

      <nav class="navbar">
        <div class="logo">
          <span>DSC</span>
          <p>DOLLAR SHAVE CLUB</p>
        </div>

        <ul>
          <li><a href="#">Shop</a></li>
          <li><a href="#">Original Content</a></li>
          <li><a href="#">Gifts</a></li>
          <li><a href="#">Account</a></li>
          <li><a href="#">Cart</a></li>
        </ul>
      </nav>

      <div class="contact-content">
        <h1>Contact Us</h1>
        <p>Questions not answered yet? We are here to help!</p>

        <form class="contact-form">
          <label>How can we help you today?</label>

          <select>
            <option>Choose one</option>
            <option>Order Issue</option>
            <option>Payment Problem</option>
            <option>Product Question</option>
            <option>Other</option>
          </select>
        </form>

        <h4>Partnerships and Media Inquiries</h4>
      </div>

      <div class="contact-footer">
        <h3>Questions not answered?</h3>
        <a href="#">Contact us</a>
      </div>

    </section>

  </main>

</html>
